spring:
    application:
        name: "account-service"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/account_db
        driver-class-name: com.mysql.cj.jdbc.Driver
config:
       import: "optional:configserver:http://localhost:8181"
profiles:
    active:
        - uat
springdoc:
    api-docs:
        enabled: false
server:
    port: 8181
management:
    endpoints:
        web:
            exposure:
                include: "*"
logging:
    file:
        name: logs/accounts.log
build:
    version: "5.0"
eureka:
  instance:
      prefer-ip-address: true
  client:
      fetch-registry: true
      register-with-eureka: true
      service-url:
          defaultZone: http://localhost:8070/eureka


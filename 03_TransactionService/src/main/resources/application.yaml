spring:
  application:
    name: "transaction-service"
  datasource:
     username: root
     password : root123
     url: jdbc:mysql://localhost:3306/transactions_db
     driver-class-name : com.mysql.cj.jdbc.Driver
     profiles:
          active:
              - uat
springdoc:
 api-docs:
  enabled: false
server:
  port: 8282   
management:
  endpoints:
    web:
      exposure:
        include: "*"
logging:
   file:
    name: logs/transactions.log
#Custom Properties -Used in application
build:
   version: "2.0"
eureka:
   instance:
       prefer-ip-address: true
   client:
       fetch-registry: true
       register-with-eureka: true
       service-url:
           defaultZone: http://localhost:8070/eureka



